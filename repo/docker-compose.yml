services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: venue
      POSTGRES_PASSWORD: venue
      POSTGRES_DB: venue_ops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venue -d venue_ops"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://venue:venue@db:5432/venue_ops}
      APP__SERVER__HOST: ${APP__SERVER__HOST:-0.0.0.0}
      APP__SERVER__PORT: ${APP__SERVER__PORT:-8080}
      APP__SERVER__WORKERS: ${APP__SERVER__WORKERS:-4}
      APP__ENCRYPTION__KEY_HEX: ${APP__ENCRYPTION__KEY_HEX:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      APP__JWT__SECRET: ${APP__JWT__SECRET:-dev-only-jwt-secret-change-in-production}
      APP__JWT__EXPIRY_SECONDS: ${APP__JWT__EXPIRY_SECONDS:-86400}
      APP__JOBS__HOLD_EXPIRY_INTERVAL_SECS: ${APP__JOBS__HOLD_EXPIRY_INTERVAL_SECS:-60}
      APP__JOBS__PAYMENT_TIMEOUT_INTERVAL_SECS: ${APP__JOBS__PAYMENT_TIMEOUT_INTERVAL_SECS:-60}
      APP__JOBS__REMINDER_INTERVAL_SECS: ${APP__JOBS__REMINDER_INTERVAL_SECS:-3600}
      APP__JOBS__DND_RESOLVE_INTERVAL_SECS: ${APP__JOBS__DND_RESOLVE_INTERVAL_SECS:-300}
      APP__JOBS__ZERO_QTY_INTERVAL_SECS: ${APP__JOBS__ZERO_QTY_INTERVAL_SECS:-600}
      APP__JOBS__TIER_RECALC_HOUR: ${APP__JOBS__TIER_RECALC_HOUR:-2}
      APP__JOBS__BACKUP_HOUR: ${APP__JOBS__BACKUP_HOUR:-3}
      APP__BOOKING__HOLD_TIMEOUT_MINUTES: ${APP__BOOKING__HOLD_TIMEOUT_MINUTES:-15}
      APP__BOOKING__INVENTORY_STRATEGY: ${APP__BOOKING__INVENTORY_STRATEGY:-hold}
      APP__PAYMENT__INTENT_TIMEOUT_MINUTES: ${APP__PAYMENT__INTENT_TIMEOUT_MINUTES:-30}
      APP__DND__START_HOUR: ${APP__DND__START_HOUR:-21}
      APP__DND__END_HOUR: ${APP__DND__END_HOUR:-7}
      APP__BACKUP__DIR: ${APP__BACKUP__DIR:-./storage/backups}
      APP__BACKUP__TIMEZONE_OFFSET_MINUTES: ${APP__BACKUP__TIMEZONE_OFFSET_MINUTES:-0}
      APP__STORAGE__RECONCILIATION_DIR: ${APP__STORAGE__RECONCILIATION_DIR:-./storage/reconciliation_imports}
      APP__STORAGE__ATTACHMENTS_DIR: ${APP__STORAGE__ATTACHMENTS_DIR:-./storage/attachments}
      APP__STORAGE__MAX_UPLOAD_BYTES: ${APP__STORAGE__MAX_UPLOAD_BYTES:-10485760}
      APP__NOTIFICATIONS__ENABLED_CHANNELS: ${APP__NOTIFICATIONS__ENABLED_CHANNELS:-in_app}
      APP__BOOTSTRAP__SEED_DEMO_USERS: ${APP__BOOTSTRAP__SEED_DEMO_USERS:-true}
      APP__BOOTSTRAP__DEMO_PASSWORD: ${APP__BOOTSTRAP__DEMO_PASSWORD:-Test1234!}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage

volumes:
  pgdata:
